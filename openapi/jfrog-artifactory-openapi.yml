        - rclass
        - packageType
    AqlSearchResult:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              repo:
                type: string
              path:
                type: string
              name:
                type: string
              type:
                type: string
              size:
                type: integer
              created:
                type: string
                format: date-time
              modified:
                type: string
                format: date-time
        range:
          type: object
          properties:
            start_pos:
              type: integer
            end_pos:
              type: integer
            total:
              type: integer
    SearchResult:
      type: object
